services:
  - type: web
    name: gaokao-volunteer-workbench
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python api_server.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: ADMISSION_API_URL
        sync: false
      - key: ADMISSION_API_KEY
        sync: false
