services:
  - type: web
    name: gaokao-volunteer-workbench
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python api_server.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: ADMISSION_API_URL
        sync: false
      - key: ADMISSION_API_KEY
        sync: false
      - key: RESEARCH_API_URL
        sync: false
      - key: RESEARCH_API_KEY
        sync: false
      - key: BOCHA_API_KEY
        sync: false
      - key: BOCHA_API_URL
        value: https://api.bochaai.com/v1/web-search
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_API_URL
        value: https://api.deepseek.com/chat/completions
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
